simulation:
  model: 
    type: sbe_1d
    lattice_constant_A: 5.5
    E_gap_eV: .489

  order_expansion:
    enabled: true
    max_order: 3

discretization:
  k_points: 1000
  dt_fs: 0.01
  t_start_fs: -1000
  t_end_fs: 2000

interactions:
  coulomb:
    enabled: false
    screening: none

fields:
  optical:
    - id: opt_1
      pulse_type: gaussian
      amplitude: 0.01
      frequency: 0.3
      duration_fs: 100
      t0_fs: 0

  dc:
    - id: dc_1
      pulse_type: box
      amplitude: 0.002
      t_on_fs: -500
      t_off_fs: 1500

sweep:
  strategy: cartesian
  nest_by: optical

output:
  root_dir: output
  format: binary
  save_k_resolved: true
  save_macroscopic: true
  observables:
    - polarization
    - number_density
    - current_density

analysis:
  fft:
    enabled: true
    extract_harmonics: [1, 2, 3]
