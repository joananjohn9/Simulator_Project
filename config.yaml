simulation:
  model: sbe
  order_expansion:
    enabled: false
    max_order: 0

discretization:
  k_points: 1000
  dt_fs: 0.1
  t_start_fs: -100.0
  t_end_fs: 100.0

fields:
  optical:
    - id: opt_1
      pulse_type: gaussian
      amplitude: 0.5
      frequency: 1.0
      duration_fs: 50.0
      t0_fs: 0.0

    - id: opt_2
      pulse_type: gaussian
      amplitude: 1.0
      frequency: 1.5
      duration_fs: 60.0
      t0_fs: 10.0

  dc:
    - id: dc_1
      pulse_type: box
      amplitude: 0.2
      t_on_fs: -50.0
      t_off_fs: 50.0

    - id: dc_2
      pulse_type: box
      amplitude: 0.4
      t_on_fs: -30.0
      t_off_fs: 30.0

sweep:
  strategy: cartesian
  nest_by: flat  # change to: dc or flat to test behavior

output:
  root_dir: output
  format: binary
  save_k_resolved: true
  save_macroscopic: true
  observables:
    - polarization
    - number_density
    - current_density