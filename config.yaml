simulation:
  model: sbe
  order_expansion:
    enabled: false
    max_order: 3

discretization:
  k_points: 1000
  dt_fs: 0.01
  t_start_fs: -1000
  t_end_fs: 2000

interactions:
  coulomb:
    enabled: false
    screening: none

fields:
  optical:
    pulse:
      type: gaussian
      amplitude: 0.01
      frequency: 0.3
      duration_fs: 100
      t0_fs: 0

  dc:
    pulse:
      type: box
      amplitude: 0.002
      t_on_fs: -500
      t_off_fs: 1500

output:
  format: binary
  save_k_resolved: true
  save_macroscopic: true
  observables:
    - polarization
    - number_density
    - current_density

analysis:
  fft:
    enabled: true
    extract_harmonics: [1, 2, 3]
