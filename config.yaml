simulation:
  model:
    type: sbe_1d_tight_binding
    lattice_constant_A: 3.18 #lattice constant in angstrom
    E_gap_eV: 2.298 # Band gap energy in eV
    deltaE_c_eV: 1.2
    deltaE_v_eV: 1.0
    T_1_fs: 0 # Relaxation time
    T_2_fs: 100 # Dephasing time in femto seconds
    mu_e_A: 1.53 # Dipole Moment in electron Angstroms
    coulomb_constant: 201116300000000 # coulomb constant

  order_expansion:
    enabled: true
    max_order: 3

discretization:
  k_points: 1001
  dt_fs: 0.01
  t_start_fs: -1000
  t_end_fs: 1000

interactions:
  coulomb:
    enabled: false
    screening: none

fields:
  optical:
    - id: opt_1
      pulse_type: gaussian
      amplitude: 1.00
      frequency: 2.298 # Photon energy in eV converted to angular frequency internally
      duration_fs: 100
      t0_fs: 0

  dc:
    - id: dc_1
      pulse_type: box
      amplitude: 0.002
      t_on_fs: -500
      t_off_fs: 1500

sweep:
  strategy: cartesian
  nest_by: optical

output:
  root_dir: output
  format: binary
  save_k_resolved: true
  save_macroscopic: true
  observables:
    - polarization
    - number_density
    - current_density

analysis:
  fft:
    enabled: true
    extract_harmonics: [1, 2, 3]
